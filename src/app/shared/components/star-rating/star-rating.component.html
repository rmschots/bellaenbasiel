@for (star of starList(amountOfFullStars); track star) {
  <mat-icon
    [ngStyle]="{ 'font-size': size+'px', height: size+'px', width: size+'px' }">
    star {{size}}
  </mat-icon>
}
@if (hasHalfStar) {
  <mat-icon [ngStyle]="{ 'font-size': size+'px', height: size+'px', width: size+'px' }">
    star_half
  </mat-icon>
}
@if (!hideEmptyStars) {
  @for (star of starList(amountOfEmptyStars); track star) {
    <mat-icon
      [ngStyle]="{ 'font-size': size+'px', height: size+'px', width: size+'px' }">star_border
    </mat-icon>
  }
}
